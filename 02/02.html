<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대한민국 독도: 역사와 자원 개관</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }

        .hero-gradient {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .tab-active {
            border-bottom: 3px solid #1d4ed8;
            color: #1d4ed8;
            font-weight: 700;
        }

        .modal-animate {
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header Section -->
    <header class="hero-gradient text-white py-12 px-6 relative overflow-hidden">
        <!-- Home Button -->
        <div class="max-w-5xl mx-auto mb-6 relative z-20">
            <a href="../index.html" class="inline-flex items-center gap-2 px-4 py-2 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full text-sm font-medium transition-all">
                <i class="fas fa-home"></i>
                홈으로
            </a>
        </div>

        <div class="max-w-5xl mx-auto relative z-10 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">대한민국 독도</h1>
            <p class="text-xl opacity-90 font-light">역사와 법적 정의 및 자원 개관</p>
        </div>
        <div class="absolute bottom-0 right-0 opacity-10 pointer-events-none">
            <i class="fas fa-map-marked-alt text-[200px]"></i>
        </div>
    </header>

    <!-- Main Navigation -->
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto flex overflow-x-auto no-scrollbar whitespace-nowrap">
            <button onclick="filterContent('all')" id="tab-all" class="px-6 py-4 tab-active transition-all">전체보기</button>
            <button onclick="filterContent('history')" id="tab-history" class="px-6 py-4 text-slate-500 hover:text-blue-600 transition-all">역사적 명칭</button>
            <button onclick="filterContent('legal')" id="tab-legal" class="px-6 py-4 text-slate-500 hover:text-blue-600 transition-all">법적 영역</button>
            <button onclick="filterContent('geo')" id="tab-geo" class="px-6 py-4 text-slate-500 hover:text-blue-600 transition-all">지리 및 자원</button>
            <button onclick="filterContent('org')" id="tab-org" class="px-6 py-4 text-slate-500 hover:text-blue-600 transition-all">기구 및 인물</button>
        </div>
    </nav>

    <!-- Content Area -->
    <main class="max-w-5xl mx-auto p-6 min-h-screen">
        <div id="content-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Content will be injected here by JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-10 px-6 text-center">
        <p class="mb-2">독도는 지리적, 역사적, 국제법적으로 명백한 대한민국의 고유 영토입니다.</p>
        <p class="text-sm">© 2024 Dokdo Digital Encyclopedia Interface</p>
    </footer>

    <!-- Detail Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full overflow-hidden modal-animate">
            <div id="modal-header" class="h-40 flex items-center justify-center text-white relative">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/20 hover:bg-black/40 rounded-full w-8 h-8 flex items-center justify-center transition-all">
                    <i class="fas fa-times"></i>
                </button>
                <i id="modal-icon" class="text-6xl opacity-30"></i>
            </div>
            <div class="p-8">
                <span id="modal-category" class="inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2"></span>
                <h2 id="modal-title" class="text-3xl font-bold mb-4"></h2>
                <p id="modal-desc" class="text-slate-600 leading-relaxed text-lg mb-6"></p>
                <div class="border-t pt-6">
                    <button onclick="closeModal()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-bold transition-all">확인</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const data = [
            // 역사적 명칭
            { id: 1, cat: 'history', title: '우산도(于山島)', desc: '삼국시대 우산국에서 유래한 명칭으로, 조선 시대 사료에서 독도를 가리키는 가장 대표적인 이름입니다.', icon: 'fa-landmark' },
            { id: 2, cat: 'history', title: '석도(石島)', desc: "\'돌섬\'을 한자로 표기한 것으로, 1900년 대한제국 칙령 제41호에서 독도를 울릉군의 관할 구역으로 명시할 때 사용한 명칭입니다.", icon: 'fa-mountain' },
            { id: 3, cat: 'history', title: '독도(獨島)', desc: "\'돌섬\'의 방언인 \'독섬\'을 한자로 표기한 것이 현재의 공식 명칭이 되었습니다.", icon: 'fa-map-pin' },
            { id: 4, cat: 'history', title: '가지도(可支島)', desc: "강치의 옛말인 \'가지어(可支魚)\'가 많이 사는 섬이라는 뜻에서 유래했습니다.", icon: 'fa-fish' },
            { id: 5, cat: 'history', title: '자산도·간산도', desc: "기록 과정에서 \'우산도\'를 잘못 표기한 사례들입니다.", icon: 'fa-pen-nib' },
            { id: 6, cat: 'history', title: '마쓰시마(松島)', desc: "과거 일본에서 독도를 부르던 명칭이며, 당시에는 울릉도를 \'다케시마\'라고 불렀습니다.", icon: 'fa-history' },
            { id: 7, cat: 'history', title: '리앙쿠르 암초', desc: "1849년 프랑스 포경선 리앙쿠르호가 독도를 발견하고 배 이름을 따서 붙인 서양식 명칭입니다.", icon: 'fa-ship' },
            { id: 8, cat: 'history', title: '올리부차·메넬라이', desc: "1854년 러시아 수송선 올리부차호가 독도를 발견하고 서도(올리부차)와 동도(메넬라이)에 각각 붙인 이름입니다.", icon: 'fa-compass' },
            
            // 법적 용어
            { id: 9, cat: 'legal', title: '영토', desc: "국가의 주권이 미치는 지표상의 범위입니다.", icon: 'fa-vector-square' },
            { id: 10, cat: 'legal', title: '영해', desc: "해안선(기선)으로부터 12해리(약 22km)까지의 바다 영역입니다.", icon: 'fa-water' },
            { id: 11, cat: 'legal', title: '영공', desc: "영토와 영해의 수직 상공으로, 보통 대기권 이내를 의미합니다.", icon: 'fa-cloud' },
            { id: 12, cat: 'legal', title: '배타적 경제수역(EEZ)', desc: "영해 기선에서 200해리까지의 수역으로, 연안국이 해양 자원의 탐사·개발·보전 등에 대해 독점적 권리를 갖는 영역입니다.", icon: 'fa-chart-pie' },
            { id: 13, cat: 'legal', title: '중간수역(잠정수역)', desc: "배타적 경제수역이 서로 겹칠 때 한일 양국이 공동으로 어업 자원을 관리하기 위해 설정한 수역입니다.", icon: 'fa-handshake' },
            { id: 14, cat: 'legal', title: '실효적 지배', desc: "국가가 해당 영토에 대해 실제로 주권을 행사하며 평온하게 점유하고 있는 상태를 말하며, 현재 대한민국은 독도를 실효적으로 지배하고 있습니다.", icon: 'fa-shield-halved' },
            
            // 지리 및 자원
            { id: 15, cat: 'geo', title: '동도와 서도', desc: "독도를 구성하는 두 개의 주요 섬입니다.", icon: 'fa-mountain-sun' },
            { id: 16, cat: 'geo', title: '이사부길·안용복길', desc: "도로명 주소법에 따라 동도에는 이사부길, 서도에는 안용복길이라는 주소가 부여되었습니다.", icon: 'fa-road' },
            { id: 17, cat: 'geo', title: '가스 하이드레이트', desc: "천연가스가 물과 결합하여 고체 상태가 된 에너지원으로, \'불타는 얼음\'이라고도 불리며 독도 인근에 약 6억 톤이 매장되어 있습니다.", icon: 'fa-fire-flame-simple' },
            { id: 18, cat: 'geo', title: '대화퇴어장', desc: "독도 북동쪽에 위치한 한류와 난류가 만나는 황금어장입니다.", icon: 'fa-anchor' },
            { id: 19, cat: 'geo', title: '조면암', desc: "독도와 울릉도를 구성하는 주요 암석으로, 지질학적으로 두 섬이 유사함을 보여줍니다.", icon: 'fa-gem' },
            
            // 기구 및 인물
            { id: 20, cat: 'org', title: '수토관(搜討官)', desc: "조선 시대에 울릉도와 독도를 정기적으로 조사하고 관리하기 위해 파견했던 관리입니다.", icon: 'fa-user-tie' },
            { id: 21, cat: 'org', title: '독도의용수비대', desc: "1950년대 초 6·25 전쟁의 혼란을 틈탄 일본의 침투에 맞서 민간인들이 자발적으로 조직한 수호 단체입니다.", icon: 'fa-users-rectangle' },
            { id: 22, cat: 'org', title: '태정관(太政官)', desc: "1877년 \"독도는 일본과 관계가 없다\"는 지령을 내린 당시 일본 메이지 정부의 최고 행정기관입니다.", icon: 'fa-building-columns' },
            { id: 23, cat: 'org', title: '독도연구소', desc: "2008년에 설립된 정부 출연 연구기관으로 독도 관련 정책 개발과 조사를 전담합니다.", icon: 'fa-microscope' }
        ];

        const categories = {
            history: { label: '역사적 명칭', color: 'bg-amber-500', text: 'text-amber-600' },
            legal: { label: '영토 및 해양 법적 용어', color: 'bg-emerald-500', text: 'text-emerald-600' },
            geo: { label: '지리 및 자원', color: 'bg-blue-500', text: 'text-blue-600' },
            org: { label: '관련 기구 및 인물', color: 'bg-indigo-500', text: 'text-indigo-600' }
        };

        function filterContent(category) {
            const grid = document.getElementById('content-grid');
            grid.innerHTML = '';
            
            const tabs = ['all', 'history', 'legal', 'geo', 'org'];
            tabs.forEach(tab => {
                const el = document.getElementById(`tab-${tab}`);
                if (tab === category) {
                    el.classList.add('tab-active');
                    el.classList.remove('text-slate-500');
                } else {
                    el.classList.remove('tab-active');
                    el.classList.add('text-slate-500');
                }
            });

            const filtered = category === 'all' ? data : data.filter(item => item.cat === category);

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl p-6 card-hover border cursor-pointer border-slate-100 flex flex-col items-start';
                card.onclick = () => openModal(item);
                
                const catInfo = categories[item.cat];
                
                card.innerHTML = `
                    <div class="${catInfo.color} text-white w-12 h-12 rounded-lg flex items-center justify-center mb-4">
                        <i class="fas ${item.icon} text-xl"></i>
                    </div>
                    <span class="${catInfo.text} text-[10px] font-black uppercase tracking-widest mb-1">${catInfo.label}</span>
                    <h3 class="text-xl font-bold mb-2">${item.title}</h3>
                    <p class="text-slate-500 text-sm line-clamp-2">${item.desc}</p>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(item) {
            const modal = document.getElementById('modal');
            const catInfo = categories[item.cat];
            
            document.getElementById('modal-header').className = `h-40 flex items-center justify-center text-white relative ${catInfo.color}`;
            document.getElementById('modal-icon').className = `fas ${item.icon} text-6xl opacity-30`;
            document.getElementById('modal-category').innerText = catInfo.label;
            document.getElementById('modal-category').className = `inline-block px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider mb-2 ${catInfo.color} text-white`;
            document.getElementById('modal-title').innerText = item.title;
            document.getElementById('modal-desc').innerText = item.desc;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        window.onkeydown = (e) => { if(e.key === 'Escape') closeModal(); };

        window.onload = () => {
            filterContent('all');
        };
    </script>
</body>
</html>
